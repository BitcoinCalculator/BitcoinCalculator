<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIN Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #111827;
      color: #f9fafb;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 700px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      color: #d1d5db;
      line-height: 1.5;
    }

    .formula {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 14px;
      margin: 18px 0 24px 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #fbbf24;
      overflow-x: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: #111827;
      color: white;
      font-size: 16px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: #fbbf24;
      color: #111827;
    }

    .secondary {
      background: #374151;
      color: #f9fafb;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      border-radius: 14px;
      background: #111827;
      border: 1px solid #374151;
    }

    .pin-value {
      font-size: 34px;
      font-weight: 800;
      color: #34d399;
      margin-top: 8px;
    }

    .steps {
      margin-top: 18px;
      line-height: 1.8;
      color: #e5e7eb;
    }

    .step-line {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .error {
      color: #fca5a5;
      margin-top: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>PIN Calculator</h1>
    <p>Enter a year and month to calculate the PIN using the formula below.</p>

    <div class="formula">
      PIN = year × 317 + (year mod 100) × 89 + month × 613 + 100000
    </div>

    <div class="grid">
      <div>
        <label for="year">Year</label>
        <input id="year" type="number" placeholder="e.g. 2026" value="2026" />
      </div>

      <div>
        <label for="month">Month</label>
        <input id="month" type="number" min="1" max="12" placeholder="1 to 12" value="4" />
      </div>
    </div>

    <div class="buttons">
      <button class="primary" onclick="calculatePIN()">Calculate PIN</button>
      <button class="secondary" onclick="fillCurrentDate()">Use Current Month</button>
      <button class="secondary" onclick="clearAll()">Clear</button>
    </div>

    <div id="error" class="error"></div>

    <div id="result" class="result" style="display:none;">
      <div>PIN Result</div>
      <div id="pinValue" class="pin-value"></div>

      <div class="steps" id="steps"></div>
    </div>
  </div>

  <script>
    function formatNumber(num) {
      return Number(num).toLocaleString();
    }

    function calculatePIN() {
      const year = parseInt(document.getElementById("year").value, 10);
      const month = parseInt(document.getElementById("month").value, 10);
      const errorEl = document.getElementById("error");
      const resultEl = document.getElementById("result");
      const pinValueEl = document.getElementById("pinValue");
      const stepsEl = document.getElementById("steps");

      errorEl.textContent = "";
      resultEl.style.display = "none";
      stepsEl.innerHTML = "";

      if (isNaN(year) || isNaN(month)) {
        errorEl.textContent = "Please enter both a valid year and month.";
        return;
      }

      if (month < 1 || month > 12) {
        errorEl.textContent = "Month must be between 1 and 12.";
        return;
      }

      const step1 = year * 317;
      const yearMod = year % 100;
      const step2 = yearMod * 89;
      const step3 = month * 613;
      const sum = step1 + step2 + step3;
      const pin = sum + 100000;

      pinValueEl.textContent = formatNumber(pin);

      stepsEl.innerHTML = `
        <div class="step-line">1. ${year} × 317 = ${formatNumber(step1)}</div>
        <div class="step-line">2. ${yearMod} × 89 = ${formatNumber(step2)}</div>
        <div class="step-line">3. ${month} × 613 = ${formatNumber(step3)}</div>
        <div class="step-line">4. Sum = ${formatNumber(sum)}</div>
        <div class="step-line">5. + 100,000 = ${formatNumber(pin)}</div>
      `;

      resultEl.style.display = "block";
    }

    function fillCurrentDate() {
      const now = new Date();
      document.getElementById("year").value = now.getFullYear();
      document.getElementById("month").value = now.getMonth() + 1;
      calculatePIN();
    }

    function clearAll() {
      document.getElementById("year").value = "";
      document.getElementById("month").value = "";
      document.getElementById("error").textContent = "";
      document.getElementById("result").style.display = "none";
      document.getElementById("steps").innerHTML = "";
    }

    calculatePIN();
  </script>
</body>
</html>
